server:
  port: 8083

spring:
  application:
    name: related-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5001}

resilience4j:
  circuitbreaker:
    instances:
      movie-service:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 6000

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.movie: DEBUG
