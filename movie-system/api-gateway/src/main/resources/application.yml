server:
  port: 8080

spring:
  application:
    name: api-gateway

  # Cấu hình kết nối Redis chuẩn của Spring Boot
  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: [ GET, POST, PUT, DELETE, OPTIONS ]
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "X-Gateway-Source"
            allowCredentials: true
            maxAge: 3600

      routes:
        # =================================================================
        # 1. CÁC ROUTE KHÔNG YÊU CẦU TOKEN (SWAGGER)
        # (Cũng được bảo vệ chống spam 5-10 request/giây)
        # =================================================================
        - id: openapi-movie
          uri: lb://movie-service
          predicates:
            - Path=/api/movie/api-docs
          filters:
            - RewritePath=/api/movie/(?<segment>.*), /$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        - id: openapi-search
          uri: lb://search-client-service
          predicates:
            - Path=/api/search/api-docs
          filters:
            - RewritePath=/api/search/(?<segment>.*), /$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        - id: openapi-auth
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/api-docs
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /$\{segment}
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        # =================================================================
        # 2. ROUTE AUTH
        # =================================================================
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        # =================================================================
        # 3. CÁC ROUTE YÊU CẦU TOKEN
        # =================================================================

        - id: order-create-service
          uri: lb://movie-service
          predicates:
            - Path=/api/orders/create
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 4
                key-resolver: "#{@userKeyResolver}"

        # Route Tìm kiếm AI
        - id: search-service
          uri: lb://search-client-service
          predicates:
            - Path=/api/search/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        # Route Phim liên quan
        - id: related-service
          uri: lb://related-service
          predicates:
            - Path=/api/related/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

        # Route tổng cho Movie Service (Lấy danh sách phim, suất chiếu...)
        - id: movie-service
          uri: lb://movie-service
          predicates:
            - Path=/api/movies/**, /api/showtimes/**, /api/rooms/**, /api/orders/**
          filters:
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - AuthenticationFilter
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@userKeyResolver}"

      default-filters:
        - name: Retry
          args:
            retries: 2
            statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
            methods: GET
            backoff:
              firstBackoff: 100ms
              maxBackoff: 500ms
              factor: 2
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui/index.html
    enabled: true
    urls:
      - name: Movie Service API
        url: /api/movie/api-docs
      - name: Search Service API
        url: /api/search/api-docs
      - name: Auth Service API
        url: /api/auth/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.movie: DEBUG